<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1420" viewBox="0 0 1800 1420">
  <defs>
    <style>
      .bg{fill:#f7f8fb}
      .title{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:36px;font-weight:700;fill:#111827}
      .sub{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:18px;fill:#5b6472}
      .sec{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:22px;font-weight:700;fill:#111827}
      .card{fill:#fff;stroke:#d8dde8;stroke-width:1.4;rx:10}
      .cardTitle{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:18px;font-weight:700;fill:#111827}
      .note{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:13px;fill:#667085}
      .label{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:12px;fill:#344054}
      .tiny{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:10px;fill:#667085}
      .badgeText{font-family:Arial,"PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;font-weight:700;fill:#fff}
      .orange{fill:#f97316}
      .orange2{fill:#fff3e8;stroke:#fdba74}
      .green{fill:#16a34a}
      .green2{fill:#edf8ef;stroke:#86efac}
      .blue{fill:#2563eb}
      .blue2{fill:#eff6ff;stroke:#93c5fd}
      .purple{fill:#7c3aed}
      .purple2{fill:#f5f3ff;stroke:#c4b5fd}
      .grayBox{fill:#f8fafc;stroke:#d0d5dd}
      .line{stroke:#98a2b3;stroke-width:1.5;fill:none}
      .line2{stroke:#f97316;stroke-width:2;fill:none}
      .axis{stroke:#475467;stroke-width:1.2}
      .dash{stroke:#98a2b3;stroke-width:1.3;stroke-dasharray:4 4}
    </style>
    <marker id="arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#98a2b3"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L8,4 L0,8 Z" fill="#f97316"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="1420"/>
  <text class="title" x="60" y="64">结构化表达 Goodcase 候选墙</text>
  <text class="sub" x="60" y="96">先选结构，不选细节。你回复编号后，我把选中的方向沉淀成 skill 模板、选择规则和可编辑输出规范。</text>

  <text class="sec" x="60" y="148">A. PRD / 业务与产品流程图</text>
  <text class="sec" x="60" y="468">B. 数据分析 / 指标诊断图</text>
  <text class="sec" x="60" y="788">C. 竞品分析 / 市场格局图</text>
  <text class="sec" x="60" y="1108">D. 战略汇报 / 咨询信息图</text>

  <!-- A1 -->
  <rect class="card" x="60" y="170" width="520" height="250"/>
  <rect class="orange" x="86" y="194" width="46" height="28" rx="6"/><text class="badgeText" x="98" y="214">A1</text>
  <text class="cardTitle" x="148" y="214">用户主路径流程图</text>
  <text class="note" x="148" y="238">适合 PRD 讲清楚：入口、主流程、分支、异常路径</text>
  <rect class="orange2" x="105" y="285" width="90" height="42" rx="8"/><text class="label" x="124" y="310">触发入口</text>
  <rect class="grayBox" x="235" y="285" width="90" height="42" rx="8"/><text class="label" x="255" y="310">填写信息</text>
  <path class="line" d="M195 306 H235" marker-end="url(#arrow)"/>
  <polygon points="380,282 434,306 380,330 326,306" fill="#fff7ed" stroke="#fb923c"/>
  <text class="label" x="361" y="310">校验</text>
  <path class="line" d="M325 306 H326" marker-end="url(#arrow)"/>
  <rect class="grayBox" x="455" y="250" width="86" height="40" rx="8"/><text class="label" x="478" y="275">成功页</text>
  <rect class="grayBox" x="455" y="322" width="86" height="40" rx="8"/><text class="label" x="476" y="347">错误提示</text>
  <path class="line" d="M434 306 C450 306 450 270 455 270" marker-end="url(#arrow)"/>
  <path class="line" d="M434 306 C450 306 450 342 455 342" marker-end="url(#arrow)"/>
  <text class="tiny" x="104" y="384">保留重点：主路径粗线、异常路径弱化、每个节点只放动作+状态</text>

  <!-- A2 -->
  <rect class="card" x="640" y="170" width="520" height="250"/>
  <rect class="orange" x="666" y="194" width="46" height="28" rx="6"/><text class="badgeText" x="678" y="214">A2</text>
  <text class="cardTitle" x="728" y="214">角色泳道流程图</text>
  <text class="note" x="728" y="238">适合跨角色协作：用户、产品、系统、运营、三方</text>
  <rect x="680" y="270" width="430" height="36" fill="#fff7ed" stroke="#fdba74"/><text class="label" x="694" y="293">用户</text>
  <rect x="680" y="306" width="430" height="36" fill="#f8fafc" stroke="#d0d5dd"/><text class="label" x="694" y="329">系统</text>
  <rect x="680" y="342" width="430" height="36" fill="#fff7ed" stroke="#fdba74"/><text class="label" x="694" y="365">运营</text>
  <rect class="grayBox" x="770" y="274" width="70" height="24" rx="6"/><text class="tiny" x="786" y="290">提交</text>
  <rect class="grayBox" x="875" y="310" width="82" height="24" rx="6"/><text class="tiny" x="891" y="326">自动审核</text>
  <rect class="grayBox" x="995" y="346" width="82" height="24" rx="6"/><text class="tiny" x="1011" y="362">人工处理</text>
  <path class="line2" d="M840 286 C860 286 850 322 875 322" marker-end="url(#arrowOrange)"/>
  <path class="line2" d="M957 322 C980 322 970 358 995 358" marker-end="url(#arrowOrange)"/>
  <text class="tiny" x="684" y="403">保留重点：泳道即责任边界，交接点用强调色，减少无意义节点</text>

  <!-- A3 -->
  <rect class="card" x="1220" y="170" width="520" height="250"/>
  <rect class="orange" x="1246" y="194" width="46" height="28" rx="6"/><text class="badgeText" x="1258" y="214">A3</text>
  <text class="cardTitle" x="1308" y="214">页面 / 状态流转图</text>
  <text class="note" x="1308" y="238">适合复杂页面、订单状态、审核状态、任务状态</text>
  <circle cx="1320" cy="306" r="34" fill="#fff7ed" stroke="#fb923c"/><text class="label" x="1297" y="310">草稿</text>
  <circle cx="1448" cy="306" r="34" fill="#f8fafc" stroke="#98a2b3"/><text class="label" x="1426" y="310">审核中</text>
  <circle cx="1576" cy="270" r="34" fill="#f8fafc" stroke="#98a2b3"/><text class="label" x="1555" y="274">通过</text>
  <circle cx="1576" cy="342" r="34" fill="#fff7ed" stroke="#fb923c"/><text class="label" x="1555" y="346">驳回</text>
  <path class="line" d="M1354 306 H1414" marker-end="url(#arrow)"/>
  <path class="line" d="M1482 306 C1510 306 1510 270 1542 270" marker-end="url(#arrow)"/>
  <path class="line" d="M1482 306 C1510 306 1510 342 1542 342" marker-end="url(#arrow)"/>
  <path class="line2" d="M1544 356 C1470 395 1365 380 1330 340" marker-end="url(#arrowOrange)"/>
  <text class="tiny" x="1264" y="403">保留重点：状态是节点，动作是边，回退/异常用强调色</text>

  <!-- B1 -->
  <rect class="card" x="60" y="490" width="520" height="250"/>
  <rect class="blue" x="86" y="514" width="46" height="28" rx="6"/><text class="badgeText" x="98" y="534">B1</text>
  <text class="cardTitle" x="148" y="534">指标拆解树 / Driver Tree</text>
  <text class="note" x="148" y="558">适合解释指标变化：北极星 → 驱动因子 → 行动指标</text>
  <rect class="blue2" x="270" y="596" width="110" height="42" rx="8"/><text class="label" x="292" y="622">GMV 增长</text>
  <rect class="grayBox" x="120" y="670" width="100" height="36" rx="8"/><text class="label" x="141" y="693">流量</text>
  <rect class="grayBox" x="275" y="670" width="100" height="36" rx="8"/><text class="label" x="298" y="693">转化率</text>
  <rect class="grayBox" x="430" y="670" width="100" height="36" rx="8"/><text class="label" x="452" y="693">客单价</text>
  <path class="line" d="M325 638 V654 C325 668 170 654 170 670" marker-end="url(#arrow)"/>
  <path class="line" d="M325 638 V670" marker-end="url(#arrow)"/>
  <path class="line" d="M325 638 V654 C325 668 480 654 480 670" marker-end="url(#arrow)"/>
  <text class="tiny" x="104" y="724">保留重点：每层 3-5 个因子，底层必须能对应行动或指标</text>

  <!-- B2 -->
  <rect class="card" x="640" y="490" width="520" height="250"/>
  <rect class="blue" x="666" y="514" width="46" height="28" rx="6"/><text class="badgeText" x="678" y="534">B2</text>
  <text class="cardTitle" x="728" y="534">漏斗诊断图</text>
  <text class="note" x="728" y="558">适合注册、激活、下单、付费、留资等转化问题</text>
  <polygon points="770,595 1030,595 990,635 810,635" fill="#eff6ff" stroke="#93c5fd"/>
  <polygon points="810,645 990,645 955,685 845,685" fill="#dbeafe" stroke="#60a5fa"/>
  <polygon points="845,695 955,695 930,725 870,725" fill="#bfdbfe" stroke="#3b82f6"/>
  <text class="label" x="865" y="620">访问 100%</text>
  <text class="label" x="870" y="670">注册 42%</text>
  <text class="label" x="874" y="716">付费 8%</text>
  <path class="line2" d="M1010 614 H1080"/><text class="tiny" x="1088" y="618">掉点：58%</text>
  <path class="line2" d="M970 666 H1080"/><text class="tiny" x="1088" y="670">掉点：34%</text>
  <text class="tiny" x="684" y="724">保留重点：漏斗 + 最大掉点 + 分群/原因，不只画转化率</text>

  <!-- B3 -->
  <rect class="card" x="1220" y="490" width="520" height="250"/>
  <rect class="blue" x="1246" y="514" width="46" height="28" rx="6"/><text class="badgeText" x="1258" y="534">B3</text>
  <text class="cardTitle" x="1308" y="534">留存 / 分群热力图</text>
  <text class="note" x="1308" y="558">适合判断：问题来自新用户、老用户、渠道还是版本</text>
  <g transform="translate(1300,590)">
    <text class="tiny" x="-45" y="19">1月</text><text class="tiny" x="-45" y="51">2月</text><text class="tiny" x="-45" y="83">3月</text><text class="tiny" x="-45" y="115">4月</text>
    <rect x="0" y="0" width="52" height="28" fill="#1d4ed8"/><rect x="56" y="0" width="52" height="28" fill="#3b82f6"/><rect x="112" y="0" width="52" height="28" fill="#93c5fd"/><rect x="168" y="0" width="52" height="28" fill="#dbeafe"/>
    <rect x="0" y="32" width="52" height="28" fill="#2563eb"/><rect x="56" y="32" width="52" height="28" fill="#60a5fa"/><rect x="112" y="32" width="52" height="28" fill="#bfdbfe"/><rect x="168" y="32" width="52" height="28" fill="#eff6ff"/>
    <rect x="0" y="64" width="52" height="28" fill="#3b82f6"/><rect x="56" y="64" width="52" height="28" fill="#93c5fd"/><rect x="112" y="64" width="52" height="28" fill="#dbeafe"/><rect x="168" y="64" width="52" height="28" fill="#eff6ff"/>
    <rect x="0" y="96" width="52" height="28" fill="#60a5fa"/><rect x="56" y="96" width="52" height="28" fill="#bfdbfe"/><rect x="112" y="96" width="52" height="28" fill="#eff6ff"/><rect x="168" y="96" width="52" height="28" fill="#f8fafc"/>
    <text class="tiny" x="14" y="-8">D1</text><text class="tiny" x="70" y="-8">D7</text><text class="tiny" x="124" y="-8">D30</text><text class="tiny" x="176" y="-8">D60</text>
  </g>
  <text class="tiny" x="1264" y="724">保留重点：按 cohort 横向比较，旁边必须写出结论句</text>

  <!-- C1 -->
  <rect class="card" x="60" y="810" width="520" height="250"/>
  <rect class="green" x="86" y="834" width="46" height="28" rx="6"/><text class="badgeText" x="98" y="854">C1</text>
  <text class="cardTitle" x="148" y="854">竞品能力矩阵</text>
  <text class="note" x="148" y="878">适合：功能覆盖、体验能力、商业化能力、AI 能力对比</text>
  <g transform="translate(110,918)">
    <rect x="0" y="0" width="370" height="94" fill="#fff" stroke="#d0d5dd"/>
    <line x1="0" y1="30" x2="370" y2="30" stroke="#d0d5dd"/><line x1="105" y1="0" x2="105" y2="94" stroke="#d0d5dd"/><line x1="190" y1="0" x2="190" y2="94" stroke="#d0d5dd"/><line x1="275" y1="0" x2="275" y2="94" stroke="#d0d5dd"/>
    <text class="tiny" x="18" y="20">能力项</text><text class="tiny" x="126" y="20">我方</text><text class="tiny" x="211" y="20">竞品A</text><text class="tiny" x="296" y="20">竞品B</text>
    <text class="tiny" x="18" y="52">自动化</text><text class="tiny" x="136" y="52">●●●</text><text class="tiny" x="220" y="52">●●</text><text class="tiny" x="306" y="52">●●●</text>
    <text class="tiny" x="18" y="82">易用性</text><text class="tiny" x="136" y="82">●●</text><text class="tiny" x="220" y="82">●●●</text><text class="tiny" x="306" y="82">●</text>
  </g>
  <text class="tiny" x="104" y="1044">保留重点：用权重/评分替代纯打勾，最后能导出机会点</text>

  <!-- C2 -->
  <rect class="card" x="640" y="810" width="520" height="250"/>
  <rect class="green" x="666" y="834" width="46" height="28" rx="6"/><text class="badgeText" x="678" y="854">C2</text>
  <text class="cardTitle" x="728" y="854">定位四象限</text>
  <text class="note" x="728" y="878">适合：战略定位、竞品分群、市场空位判断</text>
  <line class="axis" x1="760" y1="1008" x2="1045" y2="1008" marker-end="url(#arrow)"/>
  <line class="axis" x1="902" y1="1030" x2="902" y2="910" marker-end="url(#arrow)"/>
  <line class="dash" x1="760" y1="965" x2="1045" y2="965"/><line class="dash" x1="902" y1="910" x2="902" y2="1030"/>
  <circle cx="832" cy="986" r="16" fill="#dcfce7" stroke="#22c55e"/><text class="tiny" x="822" y="990">A</text>
  <circle cx="965" cy="942" r="16" fill="#dcfce7" stroke="#22c55e"/><text class="tiny" x="955" y="946">我方</text>
  <circle cx="1005" cy="992" r="16" fill="#f8fafc" stroke="#98a2b3"/><text class="tiny" x="999" y="996">B</text>
  <text class="tiny" x="750" y="1028">低价格</text><text class="tiny" x="1010" y="1028">高价格</text><text class="tiny" x="910" y="918">高能力</text>
  <text class="tiny" x="684" y="1044">保留重点：坐标轴必须是决策变量，不能只为了好看</text>

  <!-- C3 -->
  <rect class="card" x="1220" y="810" width="520" height="250"/>
  <rect class="green" x="1246" y="834" width="46" height="28" rx="6"/><text class="badgeText" x="1258" y="854">C3</text>
  <text class="cardTitle" x="1308" y="854">市场格局 / 生态地图</text>
  <text class="note" x="1308" y="878">适合：直接竞品、替代方案、上下游、渠道与伙伴</text>
  <circle cx="1480" cy="960" r="42" fill="#dcfce7" stroke="#22c55e"/><text class="label" x="1455" y="964">核心对象</text>
  <circle cx="1355" cy="930" r="32" fill="#f8fafc" stroke="#98a2b3"/><text class="tiny" x="1336" y="934">直接竞品</text>
  <circle cx="1605" cy="930" r="32" fill="#f8fafc" stroke="#98a2b3"/><text class="tiny" x="1586" y="934">替代方案</text>
  <circle cx="1365" cy="1010" r="32" fill="#f8fafc" stroke="#98a2b3"/><text class="tiny" x="1349" y="1014">渠道</text>
  <circle cx="1595" cy="1010" r="32" fill="#f8fafc" stroke="#98a2b3"/><text class="tiny" x="1579" y="1014">伙伴</text>
  <path class="line" d="M1438 960 L1384 940"/><path class="line" d="M1522 960 L1576 940"/><path class="line" d="M1442 978 L1390 1000"/><path class="line" d="M1518 978 L1570 1000"/>
  <text class="tiny" x="1264" y="1044">保留重点：中心是核心对象/问题，外圈按关系类型分层</text>

  <!-- D1 -->
  <rect class="card" x="60" y="1130" width="520" height="250"/>
  <rect class="purple" x="86" y="1154" width="46" height="28" rx="6"/><text class="badgeText" x="98" y="1174">D1</text>
  <text class="cardTitle" x="148" y="1174">战略路线图</text>
  <text class="note" x="148" y="1198">适合：季度规划、转型路线、产品版本、能力建设路径</text>
  <line class="axis" x1="120" y1="1270" x2="520" y2="1270" marker-end="url(#arrow)"/>
  <rect class="purple2" x="130" y="1232" width="90" height="44" rx="8"/><text class="label" x="153" y="1258">0-1 验证</text>
  <rect class="grayBox" x="250" y="1232" width="90" height="44" rx="8"/><text class="label" x="268" y="1258">规模复制</text>
  <rect class="grayBox" x="370" y="1232" width="90" height="44" rx="8"/><text class="label" x="388" y="1258">平台沉淀</text>
  <text class="tiny" x="128" y="1302">Q1</text><text class="tiny" x="282" y="1302">Q2</text><text class="tiny" x="405" y="1302">Q3-Q4</text>
  <text class="tiny" x="104" y="1364">保留重点：阶段目标 + 关键举措 + 里程碑，少放任务清单</text>

  <!-- D2 -->
  <rect class="card" x="640" y="1130" width="520" height="250"/>
  <rect class="purple" x="666" y="1154" width="46" height="28" rx="6"/><text class="badgeText" x="678" y="1174">D2</text>
  <text class="cardTitle" x="728" y="1174">能力模型 / 冰山分层</text>
  <text class="note" x="728" y="1198">适合：AI 能力、组织能力、产品能力、平台能力分层</text>
  <polygon points="900,1225 805,1342 995,1342" fill="#dbeafe" stroke="#60a5fa"/>
  <polygon points="900,1225 855,1282 945,1282" fill="#bfdbfe" stroke="#3b82f6"/>
  <line x1="770" y1="1282" x2="1030" y2="1282" stroke="#2563eb" stroke-width="2"/>
  <text class="label" x="1040" y="1258">显性能力</text>
  <text class="label" x="1040" y="1302">系统能力</text>
  <text class="label" x="1040" y="1336">底层能力</text>
  <path class="line" d="M1015 1254 H1036"/><path class="line" d="M1015 1298 H1036"/><path class="line" d="M1015 1332 H1036"/>
  <text class="tiny" x="684" y="1364">保留重点：上层讲体验，下层讲机制，中间讲系统支撑</text>

  <!-- D3 -->
  <rect class="card" x="1220" y="1130" width="520" height="250"/>
  <rect class="purple" x="1246" y="1154" width="46" height="28" rx="6"/><text class="badgeText" x="1258" y="1174">D3</text>
  <text class="cardTitle" x="1308" y="1174">全景信息地图</text>
  <text class="note" x="1308" y="1198">适合：学习路线、业务全景、产品架构、复杂知识沉淀</text>
  <rect x="1285" y="1232" width="380" height="32" fill="#f5f3ff" stroke="#c4b5fd"/><text class="label" x="1300" y="1253">第一层：战略/目标</text>
  <rect x="1285" y="1270" width="380" height="52" fill="#fff" stroke="#d0d5dd"/><text class="tiny" x="1300" y="1294">模块 A</text><text class="tiny" x="1390" y="1294">模块 B</text><text class="tiny" x="1480" y="1294">模块 C</text><text class="tiny" x="1570" y="1294">模块 D</text>
  <rect x="1285" y="1328" width="380" height="32" fill="#fff7ed" stroke="#fdba74"/><text class="label" x="1300" y="1349">行动：项目 / 课程 / 工具 / 资源</text>
  <text class="tiny" x="1264" y="1364">保留重点：大图用于沉淀，汇报时拆成多页，不硬塞</text>
</svg>
